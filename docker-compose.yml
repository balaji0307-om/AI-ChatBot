version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: novascribe-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: novascribe-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      FRONTEND_ORIGIN: http://localhost:8080
    ports:
      - "9000:9000"

  frontend:
    build:
      context: ./frontend
    container_name: novascribe-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongodb_data:
